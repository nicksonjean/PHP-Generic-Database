# Schema.ini para arquivos JSON
# Este arquivo define a estrutura das tabelas e seus relacionamentos
# Compatível com bibliotecas que leem JSON como banco de dados (ex: php-jsondb)

[arquivo.json]
Format=JSON
TableName=arquivo
PrimaryKey=id
Col1="id" Text
Col2="nome" Text
Col3="created_at" Text
Col4="updated_at" Text
CharacterSet=UTF-8
DateTimeFormat=yyyy-MM-dd HH:nn:ss

[card.json]
Format=JSON
TableName=card
PrimaryKey=id
Col1="id" Text
Col2="kanban_id" Text
Col3="sector_id" Text
Col4="usuario_id" Text
Col5="tempo_estimado" Text
Col6="tempo_utilizado" Text
Col7="tempo_restante" Text
Col8="titulo" Text
Col9="descricao" Text
Col10="status" Text
Col11="prioridade" Text
Col12="ordem" Text
Col13="tema" Text
Col14="categoria" Text
Col15="completed_at" Text
Col16="created_at" Text
Col17="updated_at" Text
Col18="deleted_at" Text
ForeignKeys=kanban_id->kanban.json(id),sector_id->card_sector.json(id),usuario_id->usuario.json(id)
CharacterSet=UTF-8
DateTimeFormat=yyyy-MM-dd HH:nn:ss

[card_activity.json]
Format=JSON
TableName=card_activity
PrimaryKey=id
Col1="id" Text
Col2="card_id" Text
Col3="datahora_comeco" Text
Col4="datahora_parada" Text
Col5="notas" Text
Col6="created_at" Text
Col7="updated_at" Text
Col8="deleted_at" Text
ForeignKeys=card_id->card.json(id)
CharacterSet=UTF-8
DateTimeFormat=yyyy-MM-dd HH:nn:ss

[card_scrum.json]
Format=JSON
TableName=card_scrum
PrimaryKey=id
Col1="id" Text
Col2="card_id" Text
Col3="undefined" Text
Col4="zero" Text
Col5="half" Text
Col6="one" Text
Col7="two" Text
Col8="three" Text
Col9="five" Text
Col10="eight" Text
Col11="thirteen" Text
Col12="twenty" Text
Col13="forty" Text
Col14="hundred" Text
Col15="undetermined" Text
Col16="created_at" Text
Col17="updated_at" Text
Col18="deleted_at" Text
ForeignKeys=card_id->card.json(id)
CharacterSet=UTF-8
DateTimeFormat=yyyy-MM-dd HH:nn:ss

[card_sector.json]
Format=JSON
TableName=card_sector
PrimaryKey=id
Col1="id" Integer
Col2="nome" Text
Col3="icone" Text
Col4="created_at" DateTime
Col5="updated_at" DateTime
Col6="deleted_at" Text
CharacterSet=UTF-8
DateTimeFormat=yyyy-MM-dd HH:nn:ss

[cidade.json]
Format=JSON
TableName=cidade
PrimaryKey=id
Col1="id" Integer
Col2="nome" Text
Col3="estado_id" Integer
ForeignKeys=estado_id->estado.json(id)
CharacterSet=UTF-8
DateTimeFormat=yyyy-MM-dd HH:nn:ss

[configuracao.json]
Format=JSON
TableName=configuracao
PrimaryKey=id
Col1="id" Text
Col2="usuario_id" Text
Col3="assinatura_email" Text
Col4="avisos_sonoros" Text
Col5="notificacoes_desktop" Text
Col6="alertas_voz" Text
Col7="atalhos_teclado" Text
Col8="campos_customizados" Text
Col9="created_at" Text
Col10="updated_at" Text
Col11="deleted_at" Text
ForeignKeys=usuario_id->usuario.json(id)
CharacterSet=UTF-8
DateTimeFormat=yyyy-MM-dd HH:nn:ss

[endereco.json]
Format=JSON
TableName=endereco
PrimaryKey=id
Col1="id" Integer
Col2="cep" Text
Col3="logradouro_id" Integer
Col4="endereco" Text
Col5="bairro" Text
Col6="complemento" Text
Col7="numero" Text
Col8="cidade_id" Integer
Col9="ponto_referencia" Text
Col10="coordenadas" Text
Col11="created_at" DateTime
Col12="updated_at" DateTime
Col13="deleted_at" Text
ForeignKeys=logradouro_id->logradouro.json(id),cidade_id->cidade.json(id)
CharacterSet=UTF-8
DateTimeFormat=yyyy-MM-dd HH:nn:ss

[estado.json]
Format=JSON
TableName=estado
PrimaryKey=id
Col1="id" Integer
Col2="nome" Text
Col3="sigla" Text
CharacterSet=UTF-8
DateTimeFormat=yyyy-MM-dd HH:nn:ss

[kanban.json]
Format=JSON
TableName=kanban
PrimaryKey=id
Col1="id" Text
Col2="sprint_id" Text
Col3="nome" Text
Col4="tema" Text
Col5="created_at" Text
Col6="updated_at" Text
Col7="deleted_at" Text
ForeignKeys=sprint_id->sprint.json(id)
CharacterSet=UTF-8
DateTimeFormat=yyyy-MM-dd HH:nn:ss

[logradouro.json]
Format=JSON
TableName=logradouro
PrimaryKey=id
Col1="id" Integer
Col2="nome" Text
CharacterSet=UTF-8
DateTimeFormat=yyyy-MM-dd HH:nn:ss

[perfil.json]
Format=JSON
TableName=perfil
PrimaryKey=id
Col1="id" Integer
Col2="nome" Text
Col3="permissoes" Text
Col4="created_at" Text
Col5="updated_at" Text
Col6="deleted_at" DateTime
CharacterSet=UTF-8
DateTimeFormat=yyyy-MM-dd HH:nn:ss

[sessions.json]
Format=JSON
TableName=sessions
PrimaryKey=id
Col1="id" Text
Col2="last_activity" Integer
Col3="expiration" Integer
Col4="data" Text
CharacterSet=UTF-8
DateTimeFormat=yyyy-MM-dd HH:nn:ss

[sprint.json]
Format=JSON
TableName=sprint
PrimaryKey=id
Col1="id" Text
Col2="nome" Text
Col3="colunas" Text
Col4="status" Text
Col5="data_inicio" Text
Col6="data_fim" Text
Col7="created_at" Text
Col8="updated_at" Text
Col9="deleted_at" Text
CharacterSet=UTF-8
DateTimeFormat=yyyy-MM-dd HH:nn:ss

[test_fields.json]
Format=JSON
TableName=test_fields
PrimaryKey=field_inc
Col1="field_inc" Integer
Col2="field_int" Integer
Col3="field_char" Integer
Col4="field_varchar" Integer
Col5="field_enum" Text
Col6="field_set" Text
Col7="field_date" Text
Col8="field_time" Text
Col9="field_year" Text
Col10="field_datetime" Text
Col11="field_timestamp" Text
Col12="field_decimal" Text
Col13="field_float" Text
Col14="field_double" Text
Col15="field_bit" Text
Col16="field_binary" Text
Col17="field_blob" Text
Col18="field_base64" Text
Col19="field_varbinary" Text
Col20="field_null" Text
CharacterSet=UTF-8
DateTimeFormat=yyyy-MM-dd HH:nn:ss

[usuario.json]
Format=JSON
TableName=usuario
PrimaryKey=id
Col1="id" Integer
Col2="apelido" Text
Col3="login" Text
Col4="senha" Text
Col5="hash" Text
Col6="raw" Text
Col7="email" Text
Col8="perfil_id" Integer
Col9="logado" Integer
Col10="contagem" Integer
Col11="atual_ip" Text
Col12="ultimo_ip" Text
Col13="ultimo_acesso" DateTime
Col14="arquivo_id" Text
Col15="usuario_dados_id" Integer
Col16="created_at" DateTime
Col17="updated_at" DateTime
Col18="deleted_at" Text
ForeignKeys=perfil_id->perfil.json(id),arquivo_id->arquivo.json(id),usuario_dados_id->usuario_dados.json(id)
CharacterSet=UTF-8
DateTimeFormat=yyyy-MM-dd HH:nn:ss

[usuario_dados.json]
Format=JSON
TableName=usuario_dados
PrimaryKey=id
Col1="id" Integer
Col2="nome" Text
Col3="cpf" Text
Col4="rg" Text
Col5="emails" Text
Col6="telefones" Text
Col7="data_nascimento" Text
Col8="estado_civil" Text
Col9="profissao" Text
Col10="genero" Text
Col11="naturalidade_id" Text
Col12="filiacao" Text
Col13="observacao" Text
Col14="endereco_id" Text
Col15="created_at" Text
Col16="updated_at" Text
Col17="deleted_at" Text
ForeignKeys=naturalidade_id->cidade.json(id),endereco_id->endereco.json(id)
CharacterSet=UTF-8
DateTimeFormat=yyyy-MM-dd HH:nn:ss

# Relacionamentos entre tabelas:
# usuario -> perfil (perfil_id)
# usuario -> arquivo (arquivo_id) [opcional]
# usuario -> usuario_dados (usuario_dados_id) [opcional]
# card -> kanban (kanban_id)
# card -> card_sector (sector_id)
# card -> usuario (usuario_id)
# card_activity -> card (card_id)
# card_scrum -> card (card_id)
# kanban -> sprint (sprint_id)
# cidade -> estado (estado_id)
# endereco -> logradouro (logradouro_id)
# endereco -> cidade (cidade_id)
# usuario_dados -> cidade (naturalidade_id) [opcional]
# usuario_dados -> endereco (endereco_id) [opcional]
# configuracao -> usuario (usuario_id)
