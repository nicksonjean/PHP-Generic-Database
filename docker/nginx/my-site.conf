server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;
    root /var/www/html;
    index index.php index.html index.htm;

    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    # Configuração de upload
    client_max_body_size 100M;

    # Configuração de timeouts
    fastcgi_read_timeout 300;
    fastcgi_send_timeout 300;

    # Servir arquivos estáticos do tema nginx-directory-listing
    # Esta location tem prioridade sobre outras devido ao ^~
    location ^~ /nginx-directory-listing/ {
        alias /var/www/html/docker/assets/nginx-directory-listing/;
        access_log off;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Diretório raiz - usar index.php customizado para listing filtrado se existir
    # Se não existir, usar FancyIndex com filtros (oculta arquivos conforme .htaccess)
    location = / {
        # Verificar se index.php existe, se sim fazer rewrite
        if (-f $document_root/index.php) {
            rewrite ^ /index.php last;
        }
        # Se não existir, usar FancyIndex que oculta arquivos da listagem
        fancyindex on;
        fancyindex_exact_size off;
        fancyindex_localtime on;
        fancyindex_name_length 255;
        fancyindex_header "/docker/assets/nginx-directory-listing/header.html";
        fancyindex_footer "/docker/assets/nginx-directory-listing/footer.html";
        fancyindex_ignore "composer.json" "composer.lock" "phpcs.xml" "phpunit.xml" "phpmd.xml" "phpstan.neon" "grumphp.yml" "doctum.php" "docker-compose.yml" "favicon.ico" "trash" "vendor" "assets" "cache" "resources" "scripts" "tests" "src" "bin" "docker" "adminer" "patches" ".devcontainer" ".stub" ".git" ".env" ".htaccess" "README.md" "SETUP_USAGE.md" "class-diagram.mmd" "flowchart.mmd" "setup.sh" "setup.bat" "setupAll.sh" "setupAll.bat" "nginx-directory-listing";
    }
    
    # Processar index.php da raiz via FastCGI
    location = /index.php {
        fastcgi_pass php:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root/index.php;
        fastcgi_param PATH_INFO "";
        fastcgi_param REQUEST_URI /;
    }
    
    # Para outros caminhos, usar try_files normal
    # Prioriza arquivo, depois diretório, depois index.php do diretório
    # Se não encontrar, usar FancyIndex com filtros
    location / {
        try_files $uri $uri/ $uri/index.php @autoindex;
        fancyindex on;
        fancyindex_exact_size off;
        fancyindex_localtime on;
        fancyindex_name_length 255;
        fancyindex_header "/docker/assets/nginx-directory-listing/header.html";
        fancyindex_footer "/docker/assets/nginx-directory-listing/footer.html";
        fancyindex_ignore "composer.json" "composer.lock" "phpcs.xml" "phpunit.xml" "phpmd.xml" "phpstan.neon" "grumphp.yml" "doctum.php" "docker-compose.yml" "favicon.ico" "trash" "vendor" "assets" "cache" "resources" "scripts" "tests" "src" "bin" "docker" "adminer" "patches" ".devcontainer" ".stub" ".git" ".env" ".htaccess" "README.md" "SETUP_USAGE.md" "class-diagram.mmd" "flowchart.mmd" "setup.sh" "setup.bat" "setupAll.sh" "setupAll.bat" "nginx-directory-listing";
    }
    
    # Fallback para diretórios sem index.php - usar FancyIndex com filtros
    location @autoindex {
        root /var/www/html;
        fancyindex on;
        fancyindex_exact_size off;
        fancyindex_localtime on;
        fancyindex_name_length 255;
        fancyindex_header "/docker/assets/nginx-directory-listing/header.html";
        fancyindex_footer "/docker/assets/nginx-directory-listing/footer.html";
        fancyindex_ignore "composer.json" "composer.lock" "phpcs.xml" "phpunit.xml" "phpmd.xml" "phpstan.neon" "grumphp.yml" "doctum.php" "docker-compose.yml" "favicon.ico" "trash" "vendor" "assets" "cache" "resources" "scripts" "tests" "src" "bin" "docker" "adminer" "patches" ".devcontainer" ".stub" ".git" ".env" ".htaccess" "README.md" "SETUP_USAGE.md" "class-diagram.mmd" "flowchart.mmd" "setup.sh" "setup.bat" "setupAll.sh" "setupAll.bat" "nginx-directory-listing";
        try_files $uri $uri/ =404;
    }

    # Processamento PHP via FastCGI
    location ~ \.php$ {
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass php:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME "$document_root$fastcgi_script_name";
        fastcgi_param PATH_INFO "$fastcgi_path_info";
        
        # Variáveis de ambiente serão acessadas diretamente pelo PHP-FPM do container
        # O PHP-FPM tem acesso às variáveis de ambiente definidas no docker-compose.yml
        # Não precisamos passar via fastcgi_param pois o PHP-FPM já tem clear_env = no
    }

    # Cache para arquivos estáticos
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }
}
