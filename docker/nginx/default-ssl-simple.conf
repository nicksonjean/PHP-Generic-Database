server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name localhost;
    root /var/www/html;
    index index.php index.html index.htm;

    access_log /var/log/nginx/access-ssl.log;
    error_log /var/log/nginx/error-ssl.log;

    ssl_certificate /etc/nginx/ssl/nginx-selfsigned.crt;
    ssl_certificate_key /etc/nginx/ssl/nginx-selfsigned.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_timeout 10m;

    client_max_body_size 100M;
    fastcgi_read_timeout 300;
    fastcgi_send_timeout 300;

    # Servir arquivos estáticos do tema nginx-directory-listing
    location ^~ /nginx-directory-listing/ {
        alias /var/www/html/docker/assets/nginx-directory-listing/;
        access_log off;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
    
    location = / {
        if (-f $document_root/index.php) {
            rewrite ^ /index.php last;
        }
        fancyindex on;
        fancyindex_exact_size off;
        fancyindex_localtime on;
        fancyindex_name_length 255;
        fancyindex_header "/docker/assets/nginx-directory-listing/header.html";
        fancyindex_footer "/docker/assets/nginx-directory-listing/footer.html";
        fancyindex_ignore "composer.json" "composer.lock" "phpcs.xml" "phpunit.xml" "phpmd.xml" "phpstan.neon" "grumphp.yml" "doctum.php" "docker-compose.yml" "favicon.ico" "trash" "vendor" "assets" "cache" "resources" "scripts" "tests" "src" "bin" "docker" "adminer" "patches" ".devcontainer" ".stub" ".git" ".env" ".htaccess" "README.md" "SETUP_USAGE.md" "class-diagram.mmd" "flowchart.mmd" "setup.sh" "setup.bat" "setupAll.sh" "setupAll.bat" "nginx-directory-listing";
    }

    location = /index.php {
        fastcgi_pass ${PHP_SERVICE}:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root/index.php;
        fastcgi_param PATH_INFO "";
        fastcgi_param REQUEST_URI /;
    }
    
    location / {
        try_files $uri $uri/ $uri/index.php @autoindex;
        fancyindex on;
        fancyindex_exact_size off;
        fancyindex_localtime on;
        fancyindex_name_length 255;
        fancyindex_header "/docker/assets/nginx-directory-listing/header.html";
        fancyindex_footer "/docker/assets/nginx-directory-listing/footer.html";
        fancyindex_ignore "composer.json" "composer.lock" "phpcs.xml" "phpunit.xml" "phpmd.xml" "phpstan.neon" "grumphp.yml" "doctum.php" "docker-compose.yml" "favicon.ico" "trash" "vendor" "assets" "cache" "resources" "scripts" "tests" "src" "bin" "docker" "adminer" "patches" ".devcontainer" ".stub" ".git" ".env" ".htaccess" "README.md" "SETUP_USAGE.md" "class-diagram.mmd" "flowchart.mmd" "setup.sh" "setup.bat" "setupAll.sh" "setupAll.bat" "nginx-directory-listing";
    }
    
    location @autoindex {
        root /var/www/html;
        fancyindex on;
        fancyindex_exact_size off;
        fancyindex_localtime on;
        fancyindex_name_length 255;
        fancyindex_header "/docker/assets/nginx-directory-listing/header.html";
        fancyindex_footer "/docker/assets/nginx-directory-listing/footer.html";
        fancyindex_ignore "composer.json" "composer.lock" "phpcs.xml" "phpunit.xml" "phpmd.xml" "phpstan.neon" "grumphp.yml" "doctum.php" "docker-compose.yml" "favicon.ico" "trash" "vendor" "assets" "cache" "resources" "scripts" "tests" "src" "bin" "docker" "adminer" "patches" ".devcontainer" ".stub" ".git" ".env" ".htaccess" "README.md" "SETUP_USAGE.md" "class-diagram.mmd" "flowchart.mmd" "setup.sh" "setup.bat" "setupAll.sh" "setupAll.bat" "nginx-directory-listing";
        try_files $uri $uri/ =404;
    }

    location ~ \.php$ {
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass ${PHP_SERVICE}:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME "$document_root$fastcgi_script_name";
        fastcgi_param PATH_INFO "$fastcgi_path_info";
        fastcgi_param HTTPS "on";
        fastcgi_param SSL_PROTOCOL "$ssl_protocol";
        fastcgi_param SSL_CIPHER "$ssl_cipher";
        fastcgi_param SSL_SESSION_ID "$ssl_session_id";
        fastcgi_param SSL_CLIENT_VERIFY "$ssl_client_verify";
    }

    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Negar acesso a arquivos ocultos
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
